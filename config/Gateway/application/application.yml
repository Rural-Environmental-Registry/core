spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
      routes:
        - id: authentication-frontend
          uri: http://${AUTHENTICATION_FRONTEND_SERVICE_NAME:auth-frontend}:8080
          predicates:
            - Path=${AUTHENTICATION_FRONTEND_KEYCLOAK_BASE_URL:/auth}/**

        - id: keycloak
          uri: http://${AUTHENTICATION_BASE_KEYCLOAK_SERVICE_NAME:auth-keycloak}:8080
          predicates:
            - Path=${AUTHENTICATION_BASE_KEYCLOAK_BASE_URL:/keycloak}/**

        - id: authentication-backend
          uri: http://${AUTHENTICATION_BACKEND_SERVICE_NAME:auth-backend}:8081
          predicates:
            - Path=${AUTHENTICATION_BACKEND_KEYCLOAK_BASE_URL:/auth-backend}/**

        - id: core-backend
          uri: http://${CORE_BACKEND_API_SERVICE_NAME:core-backend}:8080
          predicates:
            - Path=${CORE_BACKEND_API_CONTEXT_PATH:/cardpgbackend}/**

        - id: calculation-engine
          uri: http://${CALCULATION_ENGINE_API_SERVICE_NAME:calc-engine}:8080
          predicates:
            - Path=${CALCULATION_ENGINE_API_BASE_URL:/calculation-engine}/**

        - id: geoserver
          uri: http://${GEOSERVER_SERVICE_NAME:geoserver}:8080
          predicates:
            - Path=${GEOSERVER_BASE_URL:/geoserver}/**

        - id: actuator
          uri: http://localhost:8080
          predicates:
            - Path=/actuator/**

        - id: core-frontend
          uri: http://${CORE_FRONTEND_SERVICE_NAME:core-frontend}:8080
          predicates:
            - Path=/**

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    org.springframework.cloud.gateway: INFO
